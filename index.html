<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=0">
    <title>AppPrice - 全球比价看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --apple-blue: #0071e3; --bg-color: #f5f5f7; }
        body { background-color: var(--bg-color); -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        @media (max-width: 768px) { ::-webkit-scrollbar { display: none; } }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #0071e3; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-[#1d1d1f] antialiased pb-20">

    <header class="glass sticky top-0 z-50 border-b border-black/5 pt-[env(safe-area-inset-top)]">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2 font-bold text-lg tracking-tight cursor-pointer" onclick="location.reload()">
                <span class="bg-[#0071e3] text-white w-7 h-7 flex items-center justify-center rounded-lg text-sm">P</span>
                AppPrice
            </div>
            <div class="flex flex-grow max-w-md mx-4 md:mx-8 relative">
                <input type="text" id="searchInput" placeholder="搜索应用..." value="ChatGPT" class="w-full bg-black/5 border-none rounded-full py-2 pl-10 pr-16 text-[13px] focus:ring-2 focus:ring-[#0071e3]/30 outline-none transition" onkeypress="if(event.key === 'Enter') doSearch()">
                <svg class="w-4 h-4 absolute left-3 top-2.5 text-black/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <button onclick="doSearch()" class="absolute right-1 top-1 bg-[#0071e3] text-white text-[12px] px-4 py-1 rounded-full hover:bg-blue-600 transition">查询</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pt-6 grid grid-cols-1 md:grid-cols-12 gap-6">
        
        <aside class="md:col-span-4 space-y-4">
            <div id="appInfoCard" class="bg-white rounded-[16px] p-5 shadow-sm border border-black/5 flex items-center gap-4">
                <div class="w-16 h-16 rounded-[14px] bg-gray-100 border border-black/5 flex flex-shrink-0 items-center justify-center text-gray-300 text-xs">Icon</div>
                <div class="overflow-hidden">
                    <h1 id="appNameTitle" class="text-lg font-bold truncate text-gray-400">等待搜索</h1>
                    <p id="appDevTitle" class="text-[12px] text-black/50 mt-1 truncate">App 基础信息</p>
                </div>
            </div>

            <div class="bg-white rounded-[16px] shadow-sm border border-black/5 overflow-hidden">
                <div class="p-4 bg-gray-50 border-b border-black/5 flex justify-between items-center">
                    <h3 class="text-[12px] font-bold text-black/40">选择内购项目</h3>
                </div>
                <div id="iapListContainer" class="p-2 space-y-1 text-sm text-gray-400 text-center min-h-[100px] flex items-center justify-center">
                    请输入应用名称查询
                </div>
            </div>
        </aside>

        <section class="md:col-span-8 space-y-6">
            <div id="heroCard" class="bg-gradient-to-r from-[#0071e3] to-[#2997ff] rounded-[20px] p-6 text-white shadow-lg relative overflow-hidden transition-all duration-300 opacity-50">
                <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                    <div>
                        <span class="bg-white/20 text-[10px] font-bold px-2 py-1 rounded tracking-wider uppercase mb-3 inline-block">Global Best Price</span>
                        <h2 id="bestName" class="text-2xl font-bold flex items-center gap-2">
                            <span id="bestFlag" class="text-3xl">🌍</span> 等待结果
                        </h2>
                        <p id="bestOriginal" class="text-white/80 text-[13px] mt-1">-</p>
                    </div>
                    <div class="text-left md:text-right w-full md:w-auto">
                        <div id="bestCny" class="text-5xl font-black tracking-tighter">¥ 0.00</div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[16px] shadow-sm border border-black/5 overflow-hidden">
                <div class="px-6 py-4 border-b border-black/5 bg-gray-50 flex justify-between items-center">
                    <h3 class="font-bold text-[13px] text-black/80">价格排行表 (折合人民币)</h3>
                    <div id="globalLoader" class="hidden"><div class="loader"></div></div>
                </div>
                <div id="priceTable" class="min-h-[200px] flex flex-col text-sm text-gray-500">
                    <div class="flex-grow flex items-center justify-center">等待数据载入...</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentData = null;
        // 修复国家 Emoji 和规范命名
        const REGION_MAP = { 
            'us':{f:'🇺🇸', n:'美国'}, 'cn':{f:'🇨🇳', n:'中国'}, 'jp':{f:'🇯🇵', n:'日本'}, 
            'tr':{f:'🇹🇷', n:'土耳其'}, 'ng':{f:'🇳🇬', n:'尼日利亚'}, 'eg':{f:'🇪🇬', n:'埃及'}, 
            'pk':{f:'🇵🇰', n:'巴基斯坦'}, 'in':{f:'🇮🇳', n:'印度'}, 'br':{f:'🇧🇷', n:'巴西'}, 
            'ar':{f:'🇦🇷', n:'阿根廷'} 
        };

        async function doSearch() {
            const app = document.getElementById('searchInput').value.trim();
            if(!app) return;

            document.getElementById('globalLoader').classList.remove('hidden');
            document.getElementById('iapListContainer').innerHTML = '<div class="loader"></div>';
            document.getElementById('priceTable').innerHTML = '';

            try {
                const res = await fetch(`/api/compare?app=${encodeURIComponent(app)}`);
                const json = await res.json();
                document.getElementById('globalLoader').classList.add('hidden');

                if (json.status === 'processing' || json.error) {
                    document.getElementById('iapListContainer').innerHTML = `<p class="text-red-500 text-center w-full">${json.message || json.error}</p>`;
                    return;
                }

                currentData = json.data;
                document.getElementById('appInfoCard').innerHTML = `
                    <img src="${currentData.app.icon}" class="w-16 h-16 rounded-[14px] shadow-sm border border-black/5">
                    <div class="overflow-hidden">
                        <h1 class="text-lg font-bold truncate text-black">${currentData.app.name}</h1>
                        <p class="text-[12px] text-black/50 mt-0.5 truncate">${currentData.app.developer}</p>
                    </div>`;

                const items = Object.keys(currentData.compareData);
                if (items.length === 0) {
                    document.getElementById('iapListContainer').innerHTML = '未抓取到内购项';
                    return;
                }

                let html = '';
                items.forEach((name, i) => {
                    const active = i === 0 ? 'bg-[#0071e3]/10 text-[#0071e3] font-bold' : 'text-black/70 hover:bg-gray-50';
                    html += `<div onclick="showCompare('${name}', this)" class="iap-item p-3 rounded-[10px] text-[13px] transition cursor-pointer flex justify-between items-center ${active}">
                        <span class="truncate pr-2">${name}</span>
                    </div>`;
                });
                document.getElementById('iapListContainer').innerHTML = html;
                showCompare(items[0]);
            } catch (e) {
                document.getElementById('globalLoader').classList.add('hidden');
                document.getElementById('iapListContainer').innerHTML = '网络请求失败';
            }
        }

        function showCompare(itemName, el) {
            if (el) {
                document.querySelectorAll('.iap-item').forEach(i => i.classList.remove('bg-[#0071e3]/10', 'text-[#0071e3]', 'font-bold'));
                el.classList.add('bg-[#0071e3]/10', 'text-[#0071e3]', 'font-bold');
            }

            const list = currentData.compareData[itemName];
            const best = list[0];
            const bInfo = REGION_MAP[best.regionCode.toLowerCase()] || {f:'🌍', n:best.regionName};

            document.getElementById('heroCard').style.opacity = '1';
            document.getElementById('bestFlag').innerText = bInfo.f;
            document.getElementById('bestName').innerHTML = `<span class="text-3xl">${bInfo.f}</span> ${bInfo.n}`;
            document.getElementById('bestOriginal').innerText = `当地原价: ${best.originalPrice}`;
            document.getElementById('bestCny').innerText = `¥${best.cnyPrice.toFixed(2)}`;

            let tableHtml = '';
            list.forEach((item, idx) => {
                const info = REGION_MAP[item.regionCode.toLowerCase()] || {f:'🌍', n:item.regionName};
                // 使用 Grid 网格系统保证对齐
                tableHtml += `
                <div class="grid grid-cols-12 gap-2 items-center p-4 border-b border-black/5 hover:bg-gray-50 transition">
                    <div class="col-span-1 text-center text-[12px] font-bold text-black/30">${idx+1}</div>
                    <div class="col-span-5 flex items-center gap-3">
                        <span class="text-2xl">${info.f}</span>
                        <span class="font-semibold text-[14px] text-black/80">${info.n}</span>
                    </div>
                    <div class="col-span-3 text-right text-[12px] text-black/40 pr-2">${item.originalPrice}</div>
                    <div class="col-span-3 text-right font-bold text-[16px] ${idx===0?'text-[#0071e3]':'text-black/80'}">¥${item.cnyPrice.toFixed(2)}</div>
                </div>`;
            });
            document.getElementById('priceTable').innerHTML = tableHtml;
        }
    </script>
</body>
</html>
