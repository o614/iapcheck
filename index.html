<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>AppPrice - 全球比价看板 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #eff6ff 100%); background-attachment: fixed; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { border-bottom: 2px solid #000; color: #000; font-weight: 700; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #0071e3; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-900 antialiased min-h-screen">

    <header class="w-full max-w-[1200px] mx-auto px-4 pt-6 pb-2 flex justify-between items-center">
        <div class="flex items-center gap-2 font-bold text-xl cursor-pointer" onclick="location.reload()">
            <div class="w-8 h-8 bg-black text-white rounded-xl flex items-center justify-center text-sm">P</div>
            AppPrice
        </div>
        <div class="flex-grow max-w-md mx-8 relative">
            <input type="text" id="searchInput" placeholder="搜索应用..." class="w-full bg-white/60 border border-white rounded-full py-2 px-10 text-sm outline-none focus:bg-white transition shadow-sm" onkeypress="if(event.key === 'Enter') doSearch(this.value)">
            <svg class="w-4 h-4 absolute left-4 top-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
        <div class="hidden md:flex items-center gap-4 text-xs font-bold text-gray-400">
            <span class="text-blue-500">HOT APPS 🔥</span>
            <div id="hotAppsList" class="flex gap-3"></div>
        </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-8 relative">
        <div id="globalLoader" class="hidden absolute inset-0 z-50 bg-white/40 backdrop-blur-sm flex items-center justify-center rounded-3xl">
            <div class="loader"></div>
        </div>

        <aside class="lg:col-span-4 space-y-6">
            <div id="appHero" class="glass-card rounded-3xl p-6 flex items-center gap-5">
                <div class="w-20 h-20 bg-gray-100 rounded-2xl flex-shrink-0 flex items-center justify-center text-gray-300">ICON</div>
                <div>
                    <h1 id="appName" class="text-xl font-bold">等待搜索...</h1>
                    <p id="appDev" class="text-sm text-gray-400">输入名称获取数据</p>
                </div>
            </div>

            <div class="glass-card rounded-3xl overflow-hidden">
                <div class="flex border-b border-gray-100">
                    <button onclick="switchMode('item')" id="modeItem" class="flex-1 py-4 text-sm font-medium active-tab">套餐对比</button>
                    <button onclick="switchMode('region')" id="modeRegion" class="flex-1 py-4 text-sm font-medium text-gray-400">地区对比</button>
                </div>
                <div id="listContainer" class="p-3 space-y-1 max-h-[500px] overflow-y-auto no-scrollbar">
                    <p class="text-center text-gray-400 py-8 text-sm">请先搜索应用</p>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8 space-y-6">
            <div class="glass-card rounded-[32px] p-8 min-h-[500px]">
                <div id="resultsHeader" class="mb-8">
                    <h2 class="text-2xl font-black tracking-tight" id="resultTitle">欢迎使用 AppPrice</h2>
                    <p class="text-sm text-gray-400 mt-1">请在左侧选择具体项目进行详细比价</p>
                </div>

                <div id="resultsList" class="space-y-4">
                    </div>
            </div>
        </section>
    </main>

    <script>
        let currentData = null;
        let viewMode = 'item'; // item 或 region
        const HOT_APPS = ['ChatGPT', 'Spotify', 'Telegram', 'YouTube'];

        window.onload = () => {
            const container = document.getElementById('hotAppsList');
            HOT_APPS.forEach(name => {
                const btn = document.createElement('button');
                btn.className = "hover:text-black transition";
                btn.innerText = name;
                btn.onclick = () => doSearch(name);
                container.appendChild(btn);
            });
        };

        async function doSearch(name) {
            document.getElementById('globalLoader').classList.remove('hidden');
            try {
                const res = await fetch(`/api/compare?app=${encodeURIComponent(name)}`);
                const json = await res.json();
                currentData = json.data;
                renderBaseInfo();
                renderList();
            } finally {
                document.getElementById('globalLoader').classList.add('hidden');
            }
        }

        function renderBaseInfo() {
            document.getElementById('appHero').innerHTML = `
                <img src="${currentData.app.icon}" class="w-20 h-20 rounded-2xl shadow-lg border border-white">
                <div>
                    <h1 class="text-xl font-bold">${currentData.app.name}</h1>
                    <p class="text-sm text-gray-400">${currentData.app.developer}</p>
                </div>
            `;
        }

        function switchMode(mode) {
            viewMode = mode;
            document.getElementById('modeItem').className = mode === 'item' ? 'flex-1 py-4 text-sm font-medium active-tab' : 'flex-1 py-4 text-sm font-medium text-gray-400';
            document.getElementById('modeRegion').className = mode === 'region' ? 'flex-1 py-4 text-sm font-medium active-tab' : 'flex-1 py-4 text-sm font-medium text-gray-400';
            renderList();
        }

        function renderList() {
            if(!currentData) return;
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            
            const dataSource = viewMode === 'item' ? currentData.compareData.byItem : currentData.compareData.byRegion;
            const keys = Object.keys(dataSource);

            keys.forEach((key, index) => {
                const item = dataSource[key];
                const div = document.createElement('div');
                div.className = `p-4 rounded-2xl cursor-pointer transition flex justify-between items-center ${index === 0 ? 'bg-black text-white' : 'hover:bg-gray-100'}`;
                div.innerHTML = `
                    <span class="text-sm font-bold">${viewMode === 'item' ? key : (item.flag + ' ' + item.name)}</span>
                    <svg class="w-4 h-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
                `;
                div.onclick = () => renderDetails(key);
                container.appendChild(div);
            });
            renderDetails(keys[0]);
        }

        function renderDetails(key) {
            const container = document.getElementById('resultsList');
            container.innerHTML = '';
            const data = viewMode === 'item' ? currentData.compareData.byItem[key] : currentData.compareData.byRegion[key].iaps;
            
            document.getElementById('resultTitle').innerText = viewMode === 'item' ? `「${key}」全球比价` : `「${currentData.compareData.byRegion[key].name}」内购全览`;

            data.forEach((row, idx) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-5 bg-gray-50/50 rounded-2xl hover:bg-white hover:shadow-sm transition border border-transparent hover:border-gray-100";
                
                if(viewMode === 'item') {
                    div.innerHTML = `
                        <div class="flex items-center gap-4">
                            <span class="text-gray-300 font-black">${idx+1}</span>
                            <span class="text-xl">${getFlag(row.regionCode)}</span>
                            <span class="font-bold">${row.regionName}</span>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-black text-blue-600">¥${row.cnyPrice}</p>
                            <p class="text-xs text-gray-400">${row.originalPrice}</p>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <span class="font-bold">${row.name}</span>
                        <div class="text-right">
                            <p class="font-black">¥${row.cnyPrice}</p>
                            <p class="text-xs text-gray-400">${row.originalPrice}</p>
                        </div>
                    `;
                }
                container.appendChild(div);
            });
        }

        function getFlag(code) {
            const flags = {'us':'🇺🇸','cn':'🇨🇳','jp':'🇯🇵','tr':'🇹🇷','ng':'🇳🇬','eg':'🇪🇬','pk':'🇵🇰','in':'🇮🇳','br':'🇧🇷','ar':'🇦🇷'};
            return flags[code.toLowerCase()] || '🌍';
        }
    </script>
</body>
</html>
